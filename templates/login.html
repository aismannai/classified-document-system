{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center; color: #e94560;">Secure Login</h2>
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required autofocus>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; color: #aaa;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: #e94560;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
